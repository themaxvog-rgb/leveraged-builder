<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — The Leveraged Builder</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%230C0C0C'/><text y='.9em' font-size='80' x='10' fill='%23D4FF00' font-family='monospace' font-weight='bold'>LB</text></svg>" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .error-page {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
    }
    .error-page__number {
      font-family: var(--font-display);
      font-size: clamp(6rem, 20vw, 14rem);
      font-weight: 700;
      color: var(--border);
      line-height: 1;
      margin-bottom: 24px;
    }
    .error-page__number span { color: var(--yellow); }
    .error-page h2 { font-size: 1.5rem; color: var(--white); margin-bottom: 12px; }
    .error-page p { max-width: 400px; margin: 0 auto 36px; }
    .error-page__links { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  </style>
</head>
<body>
  <div class="error-page">
    <div>
      <div class="error-page__number">4<span>0</span>4</div>
      <h2>This page doesn't exist.</h2>
      <p>The page you're looking for was moved, deleted, or never existed. Not much leverage in staying here.</p>
      <div class="error-page__links">
        <a href="/" class="btn btn--primary">Go home →</a>
        <a href="blog.html" class="btn btn--outline">Read articles</a>
      </div>
    </div>
  </div>
  <script src="js/main.js"></script>
</body>
</html>
