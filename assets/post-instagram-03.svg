<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <rect width="1080" height="1080" fill="#0C0C0C"/>
  <rect x="0" y="0" width="1080" height="4" fill="#D4FF00"/>
  <rect x="0" y="1076" width="1080" height="4" fill="#D4FF00"/>
  <rect x="80" y="80" width="3" height="920" fill="#D4FF00" opacity="0.2"/>

  <!-- Eyebrow -->
  <rect x="108" y="108" width="280" height="36" rx="4" fill="rgba(212,255,0,0.1)"/>
