  <text x="192" y="554" font-family="'Courier New', monospace" font-size="13" fill="#888888" letter-spacing="1">FIRST $500/MONTH PROFIT</text>
  <text x="192" y="579" font-family="Georgia, serif" font-size="20" fill="#F2F2EE">Beehiiv paid — analytics + monetization</text>
  <text x="940" y="572" font-family="'Courier New', monospace" font-size="18" fill="#D4FF00" text-anchor="end">$49</text>

