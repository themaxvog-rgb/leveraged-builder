  <text x="128" y="651" font-family="'Courier New', monospace" font-size="28" fill="#D4FF00" font-weight="bold">03</text>
  <text x="192" y="646" font-family="'Courier New', monospace" font-size="13" fill="#888888" letter-spacing="1">FIRST $1,000/MONTH PROFIT</text>
