<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <rect width="1080" height="1080" fill="#0C0C0C"/>
  <rect x="0" y="0" width="1080" height="4" fill="#D4FF00"/>
  <rect x="0" y="1076" width="1080" height="4" fill="#D4FF00"/>
  <rect x="80" y="80" width="3" height="920" fill="#FFFFFF" opacity="0.2"/>

  <!-- Eyebrow -->
  <rect x="108" y="100" width="220" height="36" rx="4" fill="#D4FF00" opacity="0.12"/>
  <text x="218" y="124" font-family="'Courier New', monospace" font-size="13" fill="#D4FF00" text-anchor="middle" letter-spacing="2">THE QUESTION</text>

  <!-- Main question -->
  <text x="108" y="230" font-family="Georgia, serif" font-size="40" fill="#888888">Before any task, ask:</text>
  <text x="108" y="310" font-family="Georgia, serif" font-size="46" fill="#F2F2EE" font-weight="bold">"If I did this</text>
  <text x="108" y="370" font-family="Georgia, serif" font-size="46" fill="#F2F2EE" font-weight="bold">10x better —</text>
  <text x="108" y="450" font-family="Georgia, serif" font-size="46" fill="#D4FF00" font-weight="bold">would it change</text>
  <text x="108" y="510" font-family="Georgia, serif" font-size="46" fill="#D4FF00" font-weight="bold">the business?"</text>

  <rect x="108" y="550" width="864" height="1" fill="#242424"/>

  <!-- YES / NO split -->
  <rect x="108" y="568" width="418" height="120" rx="8" fill="#141414"/>
  <rect x="108" y="568" width="418" height="4" rx="2" fill="#D4FF00"/>
  <text x="317" y="618" font-family="Georgia, serif" font-size="48" fill="#D4FF00" text-anchor="middle" font-weight="bold">YES</text>
  <text x="317" y="658" font-family="'Courier New', monospace" font-size="14" fill="#888888" text-anchor="middle">protect this time</text>
  <text x="317" y="678" font-family="'Courier New', monospace" font-size="14" fill="#888888" text-anchor="middle">it's leverage work</text>

  <rect x="554" y="568" width="418" height="120" rx="8" fill="#141414"/>
  <rect x="554" y="568" width="418" height="4" rx="2" fill="#555555"/>
  <text x="763" y="618" font-family="Georgia, serif" font-size="48" fill="#555555" text-anchor="middle" font-weight="bold">NO</text>
  <text x="763" y="658" font-family="'Courier New', monospace" font-size="14" fill="#555555" text-anchor="middle">automate, delegate,</text>
  <text x="763" y="678" font-family="'Courier New', monospace" font-size="14" fill="#555555" text-anchor="middle">or cut it</text>

  <!-- Bottom callout -->
  <rect x="108" y="720" width="864" height="100" rx="4" fill="#141414"/>
  <rect x="108" y="720" width="4" height="100" fill="#D4FF00"/>
  <text x="128" y="754" font-family="'Courier New', monospace" font-size="13" fill="#888888" letter-spacing="1">THE REALITY</text>
  <text x="128" y="784" font-family="Georgia, serif" font-size="24" fill="#F2F2EE">Most calendars are full of "NO" tasks</text>
  <text x="128" y="812" font-family="Georgia, serif" font-size="24" fill="#D4FF00">treated as urgent priorities.</text>

  <text x="111" y="1055" font-family="'Courier New', monospace" font-size="14" fill="#555555">leveragedbuilder.com</text>
  <text x="969" y="1055" font-family="Georgia, serif" font-size="28" fill="#242424" text-anchor="end" font-weight="bold">LB</text>
</svg>
